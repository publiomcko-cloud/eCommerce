databases:
  - name: datapulse-bi-db
    databaseName: datapulse
    user: datapulse
    plan: free

services:
  - type: web
    name: datapulse-bi-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: datapulse-bi-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        sync: false
