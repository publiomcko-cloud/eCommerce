name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: Backend pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: datapulse
          POSTGRES_PASSWORD: datapulse
          POSTGRES_DB: datapulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U datapulse -d datapulse"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://datapulse:datapulse@localhost:5432/datapulse
      SECRET_KEY: ci-test-secret
      ENVIRONMENT: test
      PAYMENT_PROVIDER: mock
      STORE_CURRENCY: BRL
      ADMIN_DEMO_EMAIL: admin@datapulse.local
      ADMIN_DEMO_PASSWORD: admin123-local-only

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Run frontend build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://ecommerce-8ngt.onrender.com
          NEXT_PUBLIC_STORE_NAME: DataPulse Commerce
          NEXT_PUBLIC_DEMO_MODE: "true"
        run: npm run build
