databases:
  - name: datapulse-commerce-db
    databaseName: datapulse
    user: datapulse
    plan: free

services:
  - type: web
    name: datapulse-commerce-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: datapulse-commerce-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: PAYMENT_PROVIDER
        value: mock
      - key: STORE_CURRENCY
        value: BRL
      - key: DEMO_MODE
        value: true
      - key: ADMIN_DEMO_EMAIL
        sync: false
      - key: ADMIN_DEMO_PASSWORD
        sync: false
